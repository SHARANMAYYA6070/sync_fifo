document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:13px;border:1px solid var(--stroke);background:var(--card2);cursor:pointer}\n.sw .swl{font-family:var(--mono);font-size:12px;color:var(--dim)}\n.track{width:44px;height:24px;border-radius:999px;background:rgba(120,140,190,.25);position:relative;transition:.25s}\n.track .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.25s}\n.sw.on .track{background:var(--accent);box-shadow:0 0 16px -3px var(--accent)}\n.sw.on.we .track{background:var(--blue)}\n.sw.on.re .track{background:var(--green)}\n.sw.on .knob{transform:translateX(20px)}\n/* timeline */\n.timeline{margin-top:22px;padding:0;overflow:hidden}\n.tl-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--stroke)}\n.log{max-height:230px;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}\n.log::-webkit-scrollbar{width:6px}.log::-webkit-scrollbar-thumb{background:var(--stroke);border-radius:3px}\n.logrow{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:10px;background:var(--card2);border:1px solid transparent;animation:login .3s}\n@keyframes login{from{opacity:0;transform:translateX(-8px)}}\n.logrow .cyc{font-family:var(--mono);font-size:11px;color:var(--faint);flex:0 0 auto;width:58px}\n.logrow .msg{font-family:var(--mono);font-size:13px;color:var(--txt)}\n.logrow.write{border-color:rgba(59,130,246,.3)}.logrow.write .msg{color:var(--blue)}\n.logrow.read{border-color:rgba(34,211,165,.3)}.logrow.read .msg{color:var(--green)}\n.logrow.overflow .msg,.logrow.underflow .msg{color:var(--red)}\n.logrow.idle{opacity:.5}\n.logempty{color:var(--faint);font-family:var(--mono);font-size:12px;padding:26px;text-align:center}\n/* packets overlay */\n.stage-overlay{position:fixed;inset:0;z-index:40;pointer-events:none}\n.fly{position:fixed;font-family:var(--mono);font-weight:700;font-size:15px;padding:6px 13px;border-radius:999px;border:1px solid;will-change:transform,opacity}\n/* modal */\n.modal{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:24px;background:rgba(4,7,16,.7);backdrop-filter:blur(8px);animation:fade .3s}\n@keyframes fade{from{opacity:0}}\n.modalcard{max-width:820px;width:100%;max-height:86vh;overflow-y:auto;padding:34px}\n.modalcard::-webkit-scrollbar{width:8px}.modalcard::-webkit-scrollbar-thumb{background:var(--stroke);border-radius:4px}\n.qa{margin:20px 0;border-left:2px solid var(--accent);padding-left:16px}\n.qa h4{font-size:16px;margin-bottom:6px;color:var(--txt)}\n.qa p{color:var(--dim);font-size:14px;line-height:1.6}\n.qa code{font-family:var(--mono);background:var(--card2);padding:1px 6px;border-radius:5px;color:var(--accent);font-size:13px}\n.closex{position:sticky;top:0;float:right;cursor:pointer;width:34px;height:34px;border-radius:10px;border:1px solid var(--stroke);background:var(--card2);color:var(--txt);font-size:16px}\n/* quiz */\n.quiz{display:flex;flex-direction:column;gap:18px;margin-top:30px;max-width:760px}\n.qcard{padding:22px}\n.qq{font-size:16px;font-weight:650;margin-bottom:14px}\n.qopts{display:grid;gap:9px}\n.qopt{text-align:left;cursor:pointer;padding:12px 15px;border-radius:12px;border:1px solid var(--stroke);background:var(--card2);color:var(--txt);font-size:14px;transition:.18s;display:flex;align-items:center;gap:10px}\n.qopt:hover{border-color:var(--accent)}\n.qopt .mk{width:20px;height:20px;border-radius:6px;border:1px solid var(--stroke);flex:0 0 auto;display:grid;place-items:center;font-size:12px;font-family:var(--mono)}\n.qopt.correct{border-color:var(--green);background:rgba(34,211,165,.1);color:var(--green)}\n.qopt.correct .mk{background:var(--green);color:#04120c;border-color:var(--green)}\n.qopt.wrong{border-color:var(--red);background:rgba(244,63,94,.1);color:var(--red)}\n.score{font-family:var(--mono);font-size:14px;color:var(--dim)}\n.foot{text-align:center;color:var(--faint);font-size:12px;padding:40px 6vw 60px;font-family:var(--mono)}\n.tip{position:relative;cursor:help;border-bottom:1px dotted var(--faint)}\n.tip::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%) translateY(4px);background:#0a1024;color:var(--txt);border:1px solid var(--stroke);padding:8px 11px;border-radius:9px;font-size:12px;font-family:var(--ui);white-space:normal;width:210px;opacity:0;pointer-events:none;transition:.2s;z-index:20;box-shadow:0 12px 30px -10px #000}\n.tip:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}\n.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}\n.legend span{font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;align-items:center;gap:6px}\n<\u002Fstyle><\u002Fhelmet><div class=\"app\" data-theme=\"{{ theme }}\" style=\"{{ appStyle }}\" ref=\"{{ appRef }}\"><canvas class=\"bg\" ref=\"{{ partCanvas }}\"><\u002Fcanvas><div class=\"progress\"><div class=\"progress-bar\" style=\"{{ progressStyle }}\"><\u002Fdiv><\u002Fdiv><div class=\"topbar\"><button class=\"tbtn\" onclick=\"{{ toggleTheme }}\" title=\"Toggle theme\">{{ themeIcon }}<\u002Fbutton><button class=\"tbtn\" onclick=\"{{ toggleSound }}\" title=\"Toggle sound\">{{ soundIcon }}<\u002Fbutton><div class=\"speed\"><span>Speed<\u002Fspan><input type=\"range\" min=\"0.4\" max=\"3\" step=\"0.1\" value=\"{{ speed }}\" oninput=\"{{ onSpeed }}\"><span class=\"fs11\">{{ speedLabel }}<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"stage-overlay\" ref=\"{{ stageRef }}\"><\u002Fdiv><div class=\"wrap\">\n<section class=\"hero\"><div class=\"badge\"><span class=\"dotpulse\"><\u002Fspan>Interactive RTL Learning · Zero to Interview<\u002Fdiv><div class=\"chip-stage\"><div class=\"core-glow\"><\u002Fdiv><div class=\"chip-ring r1\"><\u002Fdiv><div class=\"chip-ring r2\"><\u002Fdiv><div class=\"chip-ring r3\"><\u002Fdiv><div class=\"chip\"><b>FIFO<\u002Fb><span class=\"pin\" style=\"top:-3px;left:30px\"><\u002Fspan><span class=\"pin\" style=\"top:-3px;left:70px\"><\u002Fspan><span class=\"pin\" style=\"top:-3px;left:98px\"><\u002Fspan><span class=\"pin\" style=\"bottom:-3px;left:30px\"><\u002Fspan><span class=\"pin\" style=\"bottom:-3px;left:70px\"><\u002Fspan><span class=\"pin\" style=\"bottom:-3px;left:98px\"><\u002Fspan><span class=\"pin\" style=\"left:-3px;top:40px;width:3px;height:12px\"><\u002Fspan><span class=\"pin\" style=\"left:-3px;top:90px;width:3px;height:12px\"><\u002Fspan><span class=\"pin\" style=\"right:-3px;top:40px;width:3px;height:12px\"><\u002Fspan><span class=\"pin\" style=\"right:-3px;top:90px;width:3px;height:12px\"><\u002Fspan><\u002Fdiv><\u002Fdiv><h1 class=\"hero-t\">Synchronous FIFO<br>Visual Simulator<\u002Fh1><p class=\"hero-sub\">Learn FIFO operation through real-time animation. Watch every write, read, pointer move, and flag — clocked on the rising edge.<\u002Fp><div class=\"cta\"><a class=\"btn primary\" href=\"#sim\">Open the Simulator<\u002Fa><button class=\"btn\" onclick=\"{{ toggleInterview }}\">Interview Mode<\u002Fbutton><\u002Fdiv><div class=\"scroll-ind\"><span>SCROLL<\u002Fspan><div class=\"mouse\"><\u002Fdiv><\u002Fdiv><\u002Fsection>\n\n<section id=\"learn\"><div class=\"eyebrow\">01 — The Idea<\u002Fdiv><h2 class=\"sec\">What is a FIFO?<\u002Fh2><p class=\"lead\">FIFO stands for <b style=\"color:var(--txt)\">First In, First Out<\u002Fb>. Think of a queue of people at a counter: whoever arrives first is served first. A FIFO buffer is exactly that — data leaves in the same order it entered.<\u002Fp><div class=\"qwrap glass\" style=\"padding:26px\"><div class=\"qrow glass\"><span class=\"qlabel\">QUEUE OF PEOPLE — first in, first out<\u002Fspan><span class=\"qtag out\">EXIT ↑<\u002Fspan><div class=\"qtrack\" ref=\"{{ queueRef }}\"><sc-for list=\"{{ queue }}\" as=\"p\" hint-placeholder-count=\"5\"><div class=\"person\" data-id=\"{{ p.id }}\">{{ p.label }}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><span class=\"qtag in\">← ENTER<\u002Fspan><\u002Fdiv><div class=\"qmap\"><span>Same order, stored in memory:<\u002Fspan><sc-for list=\"{{ queue }}\" as=\"p\" hint-placeholder-count=\"5\"><div class=\"mini-cell\">{{ p.label }}<\u002Fdiv><\u002Fsc-for><\u002Fdiv><p class=\"lead\" style=\"margin-top:6px;text-align:center;max-width:none\">A <b style=\"color:var(--txt)\">queue<\u002Fb> and a <b style=\"color:var(--txt)\">FIFO<\u002Fb> are the same concept — the FIFO is just a queue built in hardware memory.<\u002Fp><\u002Fdiv><\u002Fsection>\n\n<section><div class=\"eyebrow\">02 — Timing<\u002Fdiv><h2 class=\"sec\">What makes it Synchronous?<\u002Fh2><div class=\"grid2\"><div><p class=\"lead\">A <b style=\"color:var(--txt)\">synchronous<\u002Fb> FIFO uses <b style=\"color:var(--txt)\">one clock<\u002Fb>. Nothing happens whenever it feels like it — every write and read is captured on the <b style=\"color:var(--accent)\">rising edge<\u002Fb> of that clock.<\u002Fp><div class=\"point\"><span class=\"n\">↑<\u002Fspan><p>On each <b>rising edge<\u002Fb>, the circuit samples the enable signals.<\u002Fp><\u002Fdiv><div class=\"point\"><span class=\"n\">W<\u002Fspan><p>If <b>Write Enable<\u002Fb> is high and the FIFO isn't full → one word is written.<\u002Fp><\u002Fdiv><div class=\"point\"><span class=\"n\">R<\u002Fspan><p>If <b>Read Enable<\u002Fb> is high and the FIFO isn't empty → one word is read.<\u002Fp><\u002Fdiv><div class=\"edgechips\"><div class=\"echip\"><span class=\"g\"><\u002Fspan>Rising edge = action<\u002Fdiv><div class=\"echip\">Falling edge = hold<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"clockcard glass\"><canvas class=\"wave\" ref=\"{{ clockCanvas }}\"><\u002Fcanvas><p class=\"lead\" style=\"font-size:13px;margin-top:12px\">Blue glow marks each positive clock edge — the only instant state can change.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsection>\n\n<section><div class=\"eyebrow\">03 — Architecture<\u002Fdiv><h2 class=\"sec\">FIFO Block Diagram<\u002Fh2><p class=\"lead\">Every synchronous FIFO is built from the same parts: a memory array addressed by two pointers, plus control logic that generates the status flags. Data flows along the animated wires.<\u002Fp><div class=\"diagram glass\"><svg viewBox=\"0 0 760 380\"><defs><marker id=\"ah\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 z\" fill=\"var(--accent)\"><\u002Fpath><\u002Fmarker><marker id=\"ahg\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 z\" fill=\"var(--green)\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n<rect x=\"290\" y=\"120\" width=\"180\" height=\"150\" rx=\"16\" fill=\"var(--card2)\" stroke=\"var(--accent)\" stroke-width=\"1.5\"><\u002Frect><text x=\"380\" y=\"150\" text-anchor=\"middle\" fill=\"var(--txt)\" class=\"blk-t\">FIFO MEMORY<\u002Ftext><text x=\"380\" y=\"170\" text-anchor=\"middle\" fill=\"var(--dim)\" class=\"blk-s\">8 × 8-bit<\u002Ftext>\n<rect x=\"315\" y=\"185\" width=\"130\" height=\"26\" rx=\"7\" fill=\"rgba(59,130,246,.12)\" stroke=\"var(--blue)\"><\u002Frect><text x=\"380\" y=\"202\" text-anchor=\"middle\" fill=\"var(--blue)\" class=\"blk-s\">Write Pointer<\u002Ftext>\n<rect x=\"315\" y=\"220\" width=\"130\" height=\"26\" rx=\"7\" fill=\"rgba(34,211,165,.12)\" stroke=\"var(--green)\"><\u002Frect><text x=\"380\" y=\"237\" text-anchor=\"middle\" fill=\"var(--green)\" class=\"blk-s\">Read Pointer<\u002Ftext>\n<line x1=\"70\" y1=\"150\" x2=\"288\" y2=\"150\" stroke=\"var(--blue)\" stroke-width=\"2\" class=\"wireflow\" marker-end=\"url(#ah)\"><\u002Fline><text x=\"70\" y=\"142\" fill=\"var(--dim)\" class=\"blk-s\">Data In [7:0]<\u002Ftext>\n<line x1=\"70\" y1=\"185\" x2=\"288\" y2=\"185\" stroke=\"var(--stroke)\" stroke-width=\"2\" marker-end=\"url(#ah)\"><\u002Fline><text x=\"70\" y=\"177\" fill=\"var(--dim)\" class=\"blk-s\">Write Enable<\u002Ftext>\n<line x1=\"70\" y1=\"220\" x2=\"288\" y2=\"220\" stroke=\"var(--stroke)\" stroke-width=\"2\" marker-end=\"url(#ahg)\"><\u002Fline><text x=\"70\" y=\"212\" fill=\"var(--dim)\" class=\"blk-s\">Read Enable<\u002Ftext>\n<line x1=\"70\" y1=\"255\" x2=\"288\" y2=\"255\" stroke=\"var(--stroke)\" stroke-width=\"2\" marker-end=\"url(#ah)\"><\u002Fline><text x=\"70\" y=\"247\" fill=\"var(--dim)\" class=\"blk-s\">Clock<\u002Ftext>\n<line x1=\"70\" y1=\"290\" x2=\"288\" y2=\"290\" stroke=\"var(--stroke)\" stroke-width=\"2\" marker-end=\"url(#ah)\"><\u002Fline><text x=\"70\" y=\"308\" fill=\"var(--dim)\" class=\"blk-s\">Reset<\u002Ftext>\n<line x1=\"472\" y1=\"195\" x2=\"690\" y2=\"195\" stroke=\"var(--green)\" stroke-width=\"2\" class=\"wireflow\" marker-end=\"url(#ahg)\"><\u002Fline><text x=\"600\" y=\"187\" fill=\"var(--dim)\" class=\"blk-s\">Data Out [7:0]<\u002Ftext>\n<rect x=\"560\" y=\"60\" width=\"130\" height=\"30\" rx=\"8\" fill=\"var(--card2)\" stroke=\"var(--red)\"><\u002Frect><text x=\"625\" y=\"80\" text-anchor=\"middle\" fill=\"var(--red)\" class=\"blk-s\">Full Flag<\u002Ftext><line x1=\"470\" y1=\"130\" x2=\"560\" y2=\"78\" stroke=\"var(--stroke)\" stroke-width=\"1.5\" marker-end=\"url(#ah)\"><\u002Fline>\n<rect x=\"560\" y=\"290\" width=\"130\" height=\"30\" rx=\"8\" fill=\"var(--card2)\" stroke=\"var(--amber)\"><\u002Frect><text x=\"625\" y=\"310\" text-anchor=\"middle\" fill=\"var(--amber)\" class=\"blk-s\">Empty Flag<\u002Ftext><line x1=\"470\" y1=\"255\" x2=\"560\" y2=\"305\" stroke=\"var(--stroke)\" stroke-width=\"1.5\" marker-end=\"url(#ah)\"><\u002Fline>\n<rect x=\"560\" y=\"120\" width=\"130\" height=\"30\" rx=\"8\" fill=\"var(--card2)\" stroke=\"var(--stroke)\"><\u002Frect><text x=\"625\" y=\"140\" text-anchor=\"middle\" fill=\"var(--dim)\" class=\"blk-s\">Count<\u002Ftext><line x1=\"470\" y1=\"155\" x2=\"560\" y2=\"140\" stroke=\"var(--stroke)\" stroke-width=\"1.5\" marker-end=\"url(#ah)\"><\u002Fline>\n<\u002Fsvg><\u002Fdiv><\u002Fsection>\n\n<section id=\"sim\"><div class=\"eyebrow\">04 — Live Simulator<\u002Fdiv><h2 class=\"sec\">Run the FIFO Yourself<\u002Fh2><p class=\"lead\">Flip <span class=\"tip\" data-tip=\"Write Enable — request to push data on the next rising edge\">Write Enable<\u002Fspan> / <span class=\"tip\" data-tip=\"Read Enable — request to pop data on the next rising edge\">Read Enable<\u002Fspan>, then pulse the clock — or press <b style=\"color:var(--txt)\">Write<\u002Fb> / <b style=\"color:var(--txt)\">Read<\u002Fb> directly. Watch the pointers glide and the flags light up.<\u002Fp>\n<div class=\"simgrid\">\n<div class=\"panel glass memcol\"><h3>FIFO Memory<\u002Fh3><div class=\"cells\" ref=\"{{ memRef }}\"><div class=\"ptr wp\" style=\"{{ wpStyle }}\"><span class=\"ptrlabel\">WPTR<\u002Fspan><span class=\"tri\"><\u002Fspan><\u002Fdiv><div class=\"ptr rp\" style=\"{{ rpStyle }}\"><span class=\"tri\"><\u002Fspan><span class=\"ptrlabel\">RPTR<\u002Fspan><\u002Fdiv><sc-for list=\"{{ cells }}\" as=\"c\" hint-placeholder-count=\"8\"><div class=\"{{ c.cls }}\" data-idx=\"{{ c.idx }}\"><span class=\"adr\">addr {{ c.adr }}<\u002Fspan><span class=\"{{ c.valcls }}\">{{ c.val }}<\u002Fspan><\u002Fdiv><\u002Fsc-for><\u002Fdiv><div class=\"ptrmeta\"><div class=\"pm w\"><div class=\"k\">Write Ptr<\u002Fdiv><div class=\"v\">{{ wpBin }} · {{ wp }}<\u002Fdiv><\u002Fdiv><div class=\"pm r\"><div class=\"k\">Read Ptr<\u002Fdiv><div class=\"v\">{{ rpBin }} · {{ rp }}<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n\n<div class=\"io\"><div class=\"iobox\"><span class=\"lab\">DATA IN<\u002Fspan><span class=\"{{ inCap }}\">{{ inVal }}<\u002Fspan><\u002Fdiv><div class=\"mainwave glass\"><div class=\"fx jb ac\" style=\"margin-bottom:8px\"><span class=\"lab\" style=\"font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim)\">CLOCK · cycle {{ cycle }}<\u002Fspan><span class=\"lab\" style=\"font-family:var(--mono);font-size:11px;color:{{ clkColor }}\">{{ clkState }}<\u002Fspan><\u002Fdiv><canvas class=\"mwave\" ref=\"{{ mainClockCanvas }}\"><\u002Fcanvas><\u002Fdiv><div><div class=\"fx jb\" style=\"margin-bottom:8px\"><span class=\"lab\" style=\"font-family:var(--mono);font-size:11px;color:var(--dim)\">OCCUPANCY<\u002Fspan><span class=\"lab\" style=\"font-family:var(--mono);font-size:11px;color:var(--dim)\">{{ count }} / {{ size }}<\u002Fspan><\u002Fdiv><div class=\"fifobar\"><div class=\"fifofill\" style=\"{{ fillStyle }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"iobox\"><span class=\"lab\">DATA OUT<\u002Fspan><span class=\"{{ outCap }}\">{{ outVal }}<\u002Fspan><\u002Fdiv><p class=\"lead\" style=\"font-size:13px;text-align:center\">{{ explain }}<\u002Fp><\u002Fdiv>\n\n<div><div class=\"panel glass\"><h3>Status<\u002Fh3><div class=\"stats\"><div class=\"stat\"><div class=\"k\">Count<\u002Fdiv><div class=\"v\">{{ count }}<\u002Fdiv><\u002Fdiv><div class=\"stat\"><div class=\"k\">FIFO Size<\u002Fdiv><div class=\"v\">{{ size }}<\u002Fdiv><\u002Fdiv><div class=\"stat\"><div class=\"k\">Used<\u002Fdiv><div class=\"v\" style=\"color:var(--blue)\">{{ count }}<\u002Fdiv><\u002Fdiv><div class=\"stat\"><div class=\"k\">Free<\u002Fdiv><div class=\"v\" style=\"color:var(--green)\">{{ free }}<\u002Fdiv><\u002Fdiv><div class=\"stat\"><div class=\"k\">Clock Cycles<\u002Fdiv><div class=\"v\">{{ cycle }}<\u002Fdiv><\u002Fdiv><div class=\"stat\"><div class=\"k\">W / R<\u002Fdiv><div class=\"v\">{{ writes }}·{{ reads }}<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"flags\"><div class=\"{{ flagFull }}\"><span class=\"led\"><\u002Fspan><span class=\"fn\">FULL<\u002Fspan><\u002Fdiv><div class=\"{{ flagEmpty }}\"><span class=\"led\"><\u002Fspan><span class=\"fn\">EMPTY<\u002Fspan><\u002Fdiv><div class=\"{{ flagAF }}\"><span class=\"led\"><\u002Fspan><span class=\"fn\">ALMOST FULL<\u002Fspan><\u002Fdiv><div class=\"{{ flagAE }}\"><span class=\"led\"><\u002Fspan><span class=\"fn\">ALMOST EMPTY<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"controls glass\"><h3 style=\"font-size:13px;text-transform:uppercase;letter-spacing:.16em;color:var(--dim);font-weight:700;margin-bottom:16px\">Control Panel<\u002Fh3><div class=\"ctrlgrid\"><button class=\"cbtn green\" onclick=\"{{ doWrite }}\"><span class=\"ic\">▸<\u002Fspan>Write Data<span class=\"fs11\" style=\"color:var(--faint)\">W<\u002Fspan><\u002Fbutton><button class=\"cbtn blue\" onclick=\"{{ doRead }}\"><span class=\"ic\">◂<\u002Fspan>Read Data<span class=\"fs11\" style=\"color:var(--faint)\">R<\u002Fspan><\u002Fbutton><button class=\"{{ clkBtnCls }}\" onclick=\"{{ toggleClock }}\"><span class=\"ic\">{{ clkBtnIcon }}<\u002Fspan>{{ clkBtnLabel }}<span class=\"fs11\" style=\"color:var(--faint)\">Space<\u002Fspan><\u002Fbutton><button class=\"cbtn\" onclick=\"{{ pulse }}\"><span class=\"ic\">↦<\u002Fspan>Single Pulse<span class=\"fs11\" style=\"color:var(--faint)\">S<\u002Fspan><\u002Fbutton><button class=\"{{ demoBtnCls }}\" onclick=\"{{ toggleDemo }}\"><span class=\"ic\">∞<\u002Fspan>Auto Demo<span class=\"fs11\" style=\"color:var(--faint)\">D<\u002Fspan><\u002Fbutton><button class=\"cbtn amber\" onclick=\"{{ clearFifo }}\"><span class=\"ic\">⌫<\u002Fspan>Clear FIFO<span class=\"fs11\" style=\"color:var(--faint)\">C<\u002Fspan><\u002Fbutton><button class=\"cbtn red\" onclick=\"{{ resetFifo }}\"><span class=\"ic\">⟲<\u002Fspan>Reset<span class=\"fs11\" style=\"color:var(--faint)\">0<\u002Fspan><\u002Fbutton><button class=\"cbtn\" onclick=\"{{ exportLog }}\"><span class=\"ic\">⇩<\u002Fspan>Export Log<\u002Fbutton><\u002Fdiv><div class=\"enables\"><button class=\"{{ weCls }}\" onclick=\"{{ toggleWE }}\"><span class=\"swl\">Write Enable<\u002Fspan><span class=\"track\"><span class=\"knob\"><\u002Fspan><\u002Fspan><\u002Fbutton><button class=\"{{ reCls }}\" onclick=\"{{ toggleRE }}\"><span class=\"swl\">Read Enable<\u002Fspan><span class=\"track\"><span class=\"knob\"><\u002Fspan><\u002Fspan><\u002Fbutton><\u002Fdiv><div class=\"legend\"><span><span class=\"kbd\">W<\u002Fspan>write<\u002Fspan><span><span class=\"kbd\">R<\u002Fspan>read<\u002Fspan><span><span class=\"kbd\">Space<\u002Fspan>run clock<\u002Fspan><span><span class=\"kbd\">S<\u002Fspan>step<\u002Fspan><span><span class=\"kbd\">D<\u002Fspan>demo<\u002Fspan><span><span class=\"kbd\">C<\u002Fspan>clear<\u002Fspan><\u002Fdiv><\u002Fdiv>\n\n<div class=\"timeline glass\"><div class=\"tl-head\"><h3 style=\"margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.16em;color:var(--dim);font-weight:700\">Event Timeline<\u002Fh3><span class=\"fs11\" style=\"font-family:var(--mono);color:var(--faint)\">{{ logCount }} events<\u002Fspan><\u002Fdiv><div class=\"log\" ref=\"{{ logRef }}\"><sc-if value=\"{{ hasLog }}\" hint-placeholder-val=\"{{ true }}\"><sc-for list=\"{{ log }}\" as=\"e\" hint-placeholder-count=\"0\"><div class=\"{{ e.cls }}\"><span class=\"cyc\">cyc {{ e.cyc }}<\u002Fspan><span class=\"msg\">{{ e.msg }}<\u002Fspan><\u002Fdiv><\u002Fsc-for><\u002Fsc-if><sc-if value=\"{{ noLog }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"logempty\">No events yet — press Write or start the clock.<\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section><div class=\"eyebrow\">05 — Check Yourself<\u002Fdiv><h2 class=\"sec\">Mini Quiz<\u002Fh2><p class=\"lead\">Four questions to lock in the fundamentals. Your progress bar at the top fills as you scroll and answer.<\u002Fp><div class=\"quiz\"><sc-for list=\"{{ quiz }}\" as=\"q\" hint-placeholder-count=\"4\"><div class=\"qcard glass\"><div class=\"qq\">{{ q.q }}<\u002Fdiv><div class=\"qopts\"><sc-for list=\"{{ q.opts }}\" as=\"o\" hint-placeholder-count=\"3\"><button class=\"{{ o.cls }}\" onclick=\"{{ o.pick }}\"><span class=\"mk\">{{ o.mk }}<\u002Fspan>{{ o.text }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv><\u002Fsc-for><div class=\"fx jb ac\"><span class=\"score\">Score: {{ quizScore }} / {{ quizTotal }}<\u002Fspan><button class=\"btn\" onclick=\"{{ toggleInterview }}\">Open Interview Mode →<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fsection>\n\n<div class=\"foot\">Synchronous FIFO Visual Simulator · Built for learning RTL/VLSI design · {{ size }}-deep circular buffer<\u002Fdiv>\n<\u002Fdiv>\n<sc-if value=\"{{ showInterview }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"modal\" onclick=\"{{ closeInterviewBg }}\"><div class=\"modalcard glass\" onclick=\"{{ stop }}\"><button class=\"closex\" onclick=\"{{ toggleInterview }}\">✕<\u002Fbutton><div class=\"eyebrow\">Interview Mode<\u002Fdiv><h2 class=\"sec\" style=\"font-size:32px\">FIFO — The Interview Answers<\u002Fh2><div class=\"qa\"><h4>Why is a FIFO needed?<\u002Fh4><p>It safely moves data between two blocks running at different rates or in different clock domains. The FIFO absorbs bursts: the producer can write ahead while the consumer reads later, so neither has to stall waiting for the other. It preserves ordering, which many protocols require.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>Key advantages<\u002Fh4><p>Rate matching / buffering, in-order delivery, decoupling of producer and consumer, simple flow control through <code>full<\u002Fcode> and <code>empty<\u002Fcode> flags, and (for async FIFOs) safe clock-domain crossing.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>Where is it used?<\u002Fh4><p>UART / SPI / I2C buffers, network packet queues, DMA engines, audio/video pipelines, CPU-to-peripheral bridges, and any AXI/Avalon streaming interface. Nearly every SoC has dozens of them.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>How does overflow happen?<\u002Fh4><p><b>Overflow<\u002Fb> = writing when the FIFO is already <code>full<\u002Fcode>. The write pointer would collide with the read pointer and corrupt data. Correct RTL <b>gates the write<\u002Fb>: <code>wr_en &amp; !full<\u002Fcode>. If you ignore <code>full<\u002Fcode>, you overwrite unread data.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>How does underflow happen?<\u002Fh4><p><b>Underflow<\u002Fb> = reading when the FIFO is <code>empty<\u002Fcode>. There's no valid data, so you read stale/garbage. Guard with <code>rd_en &amp; !empty<\u002Fcode>.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>FIFO vs LIFO<\u002Fh4><p><b>FIFO<\u002Fb> (queue): first item in is the first out — order preserved. <b>LIFO<\u002Fb> (stack): last item in is the first out. FIFO uses two pointers moving in the same direction; a stack uses one pointer moving up and down.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>Why a circular buffer?<\u002Fh4><p>Memory is a fixed array, but the pointers keep advancing. When a pointer reaches the last address it <b>wraps back to 0<\u002Fb> (<code>ptr = (ptr+1) % DEPTH<\u002Fcode>). This reuses freed slots without ever moving the stored data — O(1) writes and reads. That's why depth is usually a power of two: the wrap is just dropping the top address bit.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>Full vs Empty — the classic trap<\u002Fh4><p>When <code>wptr == rptr<\u002Fcode> the FIFO could be either <b>full<\u002Fb> or <b>empty<\u002Fb>. Two common fixes: (1) keep a <b>count<\u002Fb> register — empty when count==0, full when count==DEPTH (used here); or (2) add one <b>extra MSB<\u002Fb> to each pointer — empty when all bits equal, full when the wrap bits differ but the address bits match.<\u002Fp><\u002Fdiv><div class=\"qa\"><h4>Synchronous vs Asynchronous FIFO<\u002Fh4><p>Synchronous: one clock for read and write — simple, count-based flags. Asynchronous: separate read and write clocks — pointers are Gray-coded and passed through synchronizers to cross clock domains safely.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#3b82f6&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;fifoDepth&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;8&quot;,&quot;16&quot;],&quot;default&quot;:&quot;8&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;FIFO&quot;}}\">\n/* ===== Simulation model: pure FIFO logic, no rendering ===== */\nclass FIFO{\n  constructor(size){this.size=size;this.bits=Math.max(1,Math.ceil(Math.log2(size)));this.reset();}\n  reset(){this.mem=Array.from({length:this.size},()=>({data:null,flash:null}));this.wp=0;this.rp=0;this.count=0;this.cycle=0;this.writes=0;this.reads=0;}\n  clear(){this.mem.forEach(c=>{c.data=null;c.flash=null;});this.wp=0;this.rp=0;this.count=0;}\n  get full(){return this.count===this.size;}\n  get empty(){return this.count===0;}\n  write(v){if(this.full)return{ok:false,reason:'overflow'};const a=this.wp;this.mem[a]={data:v,flash:'w'};this.wp=(this.wp+1)%this.size;this.count++;this.writes++;return{ok:true,addr:a,value:v};}\n  read(){if(this.empty)return{ok:false,reason:'underflow'};const a=this.rp;const v=this.mem[a].data;this.mem[a]={data:null,flash:'r'};this.rp=(this.rp+1)%this.size;this.count--;this.reads++;return{ok:true,addr:a,value:v};}\n}\nconst PITCH=66; // px per memory row (56 height + 10 gap)\nfunction randHex(){return('0'+Math.floor(Math.random()*256).toString(16).toUpperCase()).slice(-2);}\nfunction binN(n,b){return n.toString(2).padStart(b,'0');}\n\nclass Component extends DCLogic{\n  constructor(p){\n    super(p);\n    this.appRef=React.createRef();this.partCanvas=React.createRef();this.clockCanvas=React.createRef();\n    this.mainClockCanvas=React.createRef();this.memRef=React.createRef();this.stageRef=React.createRef();\n    this.logRef=React.createRef();this.queueRef=React.createRef();\n    const depth=parseInt(this.props.fifoDepth)||8;\n    this.fifo=new FIFO(depth);\n    this.we=false;this.re=false;this.clk=null;this.clockPhase=0;this.running=false;\n    this.demoIdx=0;this.demoSeq=['W','W','W','R','W','R','W','W','R','R','W','R','R','W'];\n    this.state={theme:'dark',speed:1,sound:true,showInterview:false,tick:0,\n      inVal:'--',outVal:'--',inActive:false,outActive:false,explain:'Idle — the FIFO is waiting. Flip an enable or press Write to begin.',\n      log:[],progress:0,flash:null,quizPicks:{},qid:0,\n      queue:[{id:1,label:'P1'},{id:2,label:'P2'},{id:3,label:'P3'},{id:4,label:'P4'},{id:5,label:'P5'}]};\n    this.quizDef=[\n      {q:'In a FIFO, which item leaves first?',opts:['The last one written','The first one written','A random one'],a:1},\n      {q:'When does a synchronous FIFO perform its operations?',opts:['On the rising clock edge','Continuously','On reset only'],a:0},\n      {q:'What causes overflow?',opts:['Reading an empty FIFO','Writing a full FIFO','Resetting'],a:1},\n      {q:'Why is a FIFO built as a circular buffer?',opts:['To save power','So pointers wrap and reuse freed slots','To sort the data'],a:1}];\n    this._qseed=6;\n  }\n  /* ---------- lifecycle ---------- */\n  componentDidMount(){\n    this.setState({theme:this.props.theme||'dark'});\n    this.resize=()=>this.sizeCanvases();this.sizeCanvases();window.addEventListener('resize',this.resize);\n    this.last=performance.now();this._raf=requestAnimationFrame(this.loop);\n    this.onScroll=()=>{const h=document.documentElement;const max=h.scrollHeight-h.clientHeight;this.setState({progress:max>0?Math.min(1,h.scrollTop/max):0});};\n    window.addEventListener('scroll',this.onScroll,{passive:true});this.onScroll();\n    this.onKey=(e)=>this.handleKey(e);window.addEventListener('keydown',this.onKey);\n    this.qTimer=setInterval(()=>this.advanceQueue(),2400);\n    this.initParticles();\n  }\n  componentWillUnmount(){cancelAnimationFrame(this._raf);clearInterval(this.qTimer);this.stopClock();\n    window.removeEventListener('resize',this.resize);window.removeEventListener('scroll',this.onScroll);window.removeEventListener('keydown',this.onKey);}\n  componentDidUpdate(){const l=this.logRef.current;if(l)l.scrollTop=l.scrollHeight;}\n  /* ---------- canvas sizing ---------- */\n  sizeCanvases(){[this.partCanvas,this.clockCanvas,this.mainClockCanvas].forEach(r=>{const c=r.current;if(!c)return;const dpr=Math.min(2,window.devicePixelRatio||1);const w=c===this.partCanvas.current?window.innerWidth:c.clientWidth;const h=c===this.partCanvas.current?window.innerHeight:c.clientHeight;c.width=w*dpr;c.height=h*dpr;c.getContext('2d').setTransform(dpr,0,0,dpr,0,0);});}\n  /* ---------- particles ---------- */\n  initParticles(){const N=64;this.parts=Array.from({length:N},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.02,vy:(Math.random()-.5)*.02,r:Math.random()*1.6+.6}));}\n  drawParticles(){const c=this.partCanvas.current;if(!c)return;const ctx=c.getContext('2d');const W=window.innerWidth,H=window.innerHeight;ctx.clearRect(0,0,W,H);const acc=this.props.accent||'#3b82f6';const rgb=this.hexRgb(acc);for(const p of this.parts){p.x+=p.vx/60*8;p.y+=p.vy/60*8;if(p.x<0||p.x>1)p.vx*=-1;if(p.y<0||p.y>1)p.vy*=-1;}\n    for(let i=0;i<this.parts.length;i++){const a=this.parts[i];const ax=a.x*W,ay=a.y*H;for(let j=i+1;j<this.parts.length;j++){const b=this.parts[j];const bx=b.x*W,by=b.y*H;const d=Math.hypot(ax-bx,ay-by);if(d<130){ctx.strokeStyle=`rgba(${rgb},${(1-d/130)*.12})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();}}\n      ctx.fillStyle=`rgba(${rgb},.5)`;ctx.beginPath();ctx.arc(ax,ay,a.r,0,7);ctx.fill();}}\n  hexRgb(h){h=h.replace('#','');const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);return`${(n>>16)&255},${(n>>8)&255},${n&255}`;}\n  /* ---------- clock waveform ---------- */\n  drawWave(canvas,opts){const c=canvas;if(!c)return;const ctx=c.getContext('2d');const W=c.clientWidth,H=c.clientHeight;ctx.clearRect(0,0,W,H);\n    const acc=this.props.accent||'#3b82f6';const dim=getComputedStyle(this.appRef.current).getPropertyValue('--faint')||'#5c6889';\n    const midHi=H*0.28,midLo=H*0.72;const per=opts.per||70;const off=(this.clockPhase*per)%per;\n    // grid baseline\n    ctx.strokeStyle='rgba(120,150,220,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();\n    ctx.strokeStyle=acc;ctx.lineWidth=2.4;ctx.lineJoin='round';ctx.beginPath();\n    let x=-off,first=true,edges=[];\n    while(x<W+per){const x0=x,x1=x+per/2,x2=x+per;// high for first half, low for second\n      if(first){ctx.moveTo(Math.max(0,x0),midLo);first=false;}\n      ctx.lineTo(x0,midLo);ctx.lineTo(x0,midHi);ctx.lineTo(x1,midHi);ctx.lineTo(x1,midLo);ctx.lineTo(x2,midLo);\n      if(x0>=0&&x0<=W)edges.push(x0);x+=per;}\n    ctx.stroke();\n    // glow rising edges\n    for(const ex of edges){const glow=this.running?(1-Math.min(1,Math.abs(ex-W*0.5)/60)):0;ctx.save();ctx.strokeStyle=acc;ctx.globalAlpha=.4+glow*.6;ctx.shadowColor=acc;ctx.shadowBlur=8+glow*22;ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(ex,midLo);ctx.lineTo(ex,midHi);ctx.stroke();ctx.restore();\n      ctx.fillStyle=acc;ctx.beginPath();ctx.arc(ex,midHi,2.4+glow*2,0,7);ctx.fill();}\n    if(opts.label){ctx.fillStyle='rgba(147,160,196,.9)';ctx.font='11px ui-monospace,monospace';ctx.fillText('rising edge ↑',8,H-8);}\n  }\n  loop=(t)=>{const dt=(t-this.last)/1000;this.last=t;if(this.running)this.clockPhase+=dt/(this.period()/1000);\n    this.drawParticles();if(this.clockCanvas.current)this.drawWave(this.clockCanvas.current,{per:90,label:true});\n    if(this.mainClockCanvas.current)this.drawWave(this.mainClockCanvas.current,{per:60});\n    this._raf=requestAnimationFrame(this.loop);}\n  /* ---------- clock control ---------- */\n  period(){return 950/this.state.speed;}\n  startClock(){if(this.running)return;this.running=true;this.clk=setInterval(()=>this.onEdge(),this.period());this.forceUpdate();}\n  stopClock(){this.running=false;if(this.clk){clearInterval(this.clk);this.clk=null;}this.forceUpdate();}\n  toggleClock=()=>{this.running?this.stopClock():this.startClock();};\n  restartClockTiming(){if(this.running){clearInterval(this.clk);this.clk=setInterval(()=>this.onEdge(),this.period());}}\n  /* ---------- rising edge: the heart of synchronous operation ---------- */\n  onEdge(){const f=this.fifo;f.cycle++;\n    if(this.state.demo){const op=this.demoSeq[this.demoIdx++%this.demoSeq.length];\n      if(op==='W')this.writeCore('demo');else this.readCore('demo');}\n    else{let acted=false;if(this.we){this.writeCore('sync');acted=true;}if(this.re){this.readCore('sync');acted=true;}\n      if(!acted)this.pushLog(f.cycle,'Idle · no enable asserted','idle');}\n    this.forceUpdate();}\n  pulse=()=>{const f=this.fifo;if(!this.state.demo&&!this.we&&!this.re){f.cycle++;this.pushLog(f.cycle,'Clock pulse · no enable','idle');this.setState({explain:'One clock pulse with no enable — pointers hold. Turn on Write/Read Enable to make it act.'});this.forceUpdate();return;}this.onEdge();};\n  /* ---------- write / read core ---------- */\n  writeCore(src){const f=this.fifo;const v=randHex();const r=f.write(v);\n    if(!r.ok){this.pushLog(f.cycle,'OVERFLOW · write blocked (FIFO full)','overflow');this.flashScreen('over');this.beep('over');\n      this.setState({explain:'Overflow! The FIFO is full — correct RTL gates writes with (wr_en & !full), so no data is lost.'});return;}\n    this.pushLog(f.cycle,'WRITE '+v+' → addr '+r.addr,'write');this.beep('write');this.clearFlash(r.addr);\n    this.animatePacket('write',r.addr,v);\n    this.setState({inVal:v,inActive:true,explain:'Write: data 0x'+v+' latched into addr '+r.addr+'. Write pointer advances to '+f.wp+'.'});\n    setTimeout(()=>this.setState({inActive:false}),500);}\n  readCore(src){const f=this.fifo;const r=f.read();\n    if(!r.ok){this.pushLog(f.cycle,'UNDERFLOW · read blocked (FIFO empty)','underflow');this.flashScreen('under');this.beep('under');\n      this.setState({explain:'Underflow! The FIFO is empty — guard reads with (rd_en & !empty) to avoid reading garbage.'});return;}\n    this.pushLog(f.cycle,'READ '+r.value+' ← addr '+r.addr,'read');this.beep('read');this.clearFlash(r.addr);\n    this.animatePacket('read',r.addr,r.value);\n    this.setState({outVal:r.value,outActive:true,explain:'Read: data 0x'+r.value+' popped from addr '+r.addr+'. Read pointer advances to '+f.rp+'.'});\n    setTimeout(()=>this.setState({outActive:false}),500);}\n  clearFlash(addr){setTimeout(()=>{const c=this.fifo.mem[addr];if(c)c.flash=null;this.forceUpdate();},650);}\n  flashScreen(kind){this.setState({flash:kind});setTimeout(()=>this.setState({flash:null}),380);}\n  /* ---------- manual buttons (one implicit clock pulse) ---------- */\n  doWrite=()=>{if(this.state.demo)return;const f=this.fifo;f.cycle++;this.writeCore('manual');this.forceUpdate();};\n  doRead=()=>{if(this.state.demo)return;const f=this.fifo;f.cycle++;this.readCore('manual');this.forceUpdate();};\n  resetFifo=()=>{this.stopClock();this.fifo.reset();this.demoIdx=0;this.setState({demo:false,log:[],inVal:'--',outVal:'--',explain:'Reset — memory cleared, pointers and counters back to zero.'});this.we=false;this.re=false;this.forceUpdate();};\n  clearFifo=()=>{this.fifo.clear();this.setState({inVal:'--',outVal:'--',explain:'Cleared — data flushed and pointers reset, but cycle/log history kept.'});this.forceUpdate();};\n  toggleDemo=()=>{const d=!this.state.demo;this.setState({demo:d,explain:d?'Auto demo running — scripted writes and reads on every rising edge. Watch the flags react.':'Auto demo stopped.'});if(d){this.demoIdx=0;this.we=false;this.re=false;this.startClock();}else this.stopClock();};\n  toggleWE=()=>{this.we=!this.we;this.forceUpdate();};\n  toggleRE=()=>{this.re=!this.re;this.forceUpdate();};\n  /* ---------- packet animation (imperative, decorative) ---------- */\n  animatePacket(kind,addr,value){const stage=this.stageRef.current,mem=this.memRef.current;if(!stage||!mem)return;\n    const cell=mem.querySelector('[data-idx=\"'+addr+'\"]');if(!cell)return;const cr=cell.getBoundingClientRect();\n    const write=kind==='write';const from=write?{x:cr.left-140,y:cr.top+cr.height/2}:{x:cr.left+cr.width/2,y:cr.top+cr.height/2};\n    const to=write?{x:cr.left+cr.width/2,y:cr.top+cr.height/2}:{x:cr.right+160,y:cr.top+cr.height/2};\n    const el=document.createElement('div');el.className='fly';el.textContent=value;\n    const col=write?getComputedStyle(this.appRef.current).getPropertyValue('--blue'):getComputedStyle(this.appRef.current).getPropertyValue('--green');\n    el.style.color=col;el.style.borderColor=col;el.style.boxShadow='0 0 22px -4px '+col;el.style.background='var(--card2)';\n    el.style.left='0px';el.style.top='0px';stage.appendChild(el);\n    const start=performance.now(),dur=460;\n    const step=(t)=>{let k=Math.min(1,(t-start)/dur);const e=1-Math.pow(1-k,3);const x=from.x+(to.x-from.x)*e,y=from.y+(to.y-from.y)*e;\n      el.style.transform='translate('+x+'px,'+(y-14)+'px) scale('+(1-e*.25)+')';el.style.opacity=String(k<.85?1:(1-(k-.85)/.15));\n      if(k<1)requestAnimationFrame(step);else el.remove();};\n    requestAnimationFrame(step);}\n  /* ---------- section 2 queue demo ---------- */\n  advanceQueue(){const q=this.state.queue.slice();this._qseed++;q.shift();q.push({id:this._qseed,label:'P'+this._qseed});this.setState({queue:q});}\n  /* ---------- audio ---------- */\n  beep(type){if(!this.state.sound)return;try{this.ac=this.ac||new(window.AudioContext||window.webkitAudioContext)();const o=this.ac.createOscillator(),g=this.ac.createGain();o.connect(g);g.connect(this.ac.destination);const f={write:660,read:440,over:160,under:220}[type]||440;o.frequency.value=f;o.type=type==='over'||type==='under'?'sawtooth':'sine';g.gain.setValueAtTime(.0001,this.ac.currentTime);g.gain.exponentialRampToValueAtTime(.08,this.ac.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,this.ac.currentTime+.18);o.start();o.stop(this.ac.currentTime+.2);}catch(e){}}\n  /* ---------- log ---------- */\n  pushLog(cyc,msg,cls){const log=this.state.log.concat([{cyc,msg,cls,id:Date.now()+Math.random()}]);if(log.length>140)log.shift();this.setState({log});}\n  exportLog=()=>{const txt=this.state.log.map(e=>'cyc '+e.cyc+'\\t'+e.msg).join('\\n')||'no events';const blob=new Blob([txt],{type:'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='fifo_event_log.txt';a.click();URL.revokeObjectURL(url);};\n  /* ---------- misc toggles ---------- */\n  toggleTheme=()=>this.setState(s=>({theme:s.theme==='dark'?'light':'dark'}));\n  toggleSound=()=>this.setState(s=>({sound:!s.sound}));\n  toggleInterview=()=>this.setState(s=>({showInterview:!s.showInterview}));\n  closeInterviewBg=()=>this.setState({showInterview:false});\n  stop=(e)=>{e.stopPropagation();};\n  onSpeed=(e)=>{this.setState({speed:parseFloat(e.target.value)},()=>this.restartClockTiming());};\n  pickQuiz(qi,oi){this.setState(s=>({quizPicks:Object.assign({},s.quizPicks,{[qi]:oi})}));}\n  handleKey(e){if(this.state.showInterview&&e.key==='Escape'){this.setState({showInterview:false});return;}\n    const tag=(e.target.tagName||'').toLowerCase();if(tag==='input'||tag==='textarea')return;\n    const k=e.key.toLowerCase();\n    if(k==='w'){this.doWrite();}else if(k==='r'){this.doRead();}else if(k===' '){e.preventDefault();this.toggleClock();}\n    else if(k==='s'){this.pulse();}else if(k==='d'){this.toggleDemo();}else if(k==='c'){this.clearFifo();}else if(k==='0'){this.resetFifo();}}\n  /* ---------- render values ---------- */\n  renderVals(){\n    const f=this.fifo,s=this.state,size=f.size;\n    const cells=f.mem.map((c,i)=>({idx:i,adr:i,val:c.data==null?'empty':c.data,valcls:c.data==null?'val empty':'val',\n      cls:'cell'+(c.flash==='w'?' wflash':'')+(c.flash==='r'?' rflash':'')}));\n    const full=f.full,empty=f.empty;const af=!full&&f.count>=size-1;const ae=!empty&&f.count<=1;\n    const fl=(on,base)=>'flag '+base+(on?' on '+base:'');\n    const quiz=this.quizDef.map((q,qi)=>({q:q.q,opts:q.opts.map((t,oi)=>{const picked=s.quizPicks[qi];let cls='qopt';let mk=String.fromCharCode(65+oi);\n      if(picked!=null){if(oi===q.a)cls='qopt correct';else if(oi===picked)cls='qopt wrong';if(oi===q.a)mk='✓';else if(oi===picked)mk='✕';}\n      return{text:t,cls,mk,pick:()=>this.pickQuiz(qi,oi)};})}));\n    const score=Object.keys(s.quizPicks).reduce((n,qi)=>n+(s.quizPicks[qi]===this.quizDef[qi].a?1:0),0);\n    return{\n      theme:s.theme,appRef:this.appRef,partCanvas:this.partCanvas,clockCanvas:this.clockCanvas,mainClockCanvas:this.mainClockCanvas,\n      memRef:this.memRef,stageRef:this.stageRef,logRef:this.logRef,queueRef:this.queueRef,\n      appStyle:{'--accent':this.props.accent||'#3b82f6'},\n      progressStyle:{width:(s.progress*100).toFixed(1)+'%'},\n      themeIcon:s.theme==='dark'?'☀︎ Light':'☾ Dark',soundIcon:s.sound?'♪ Sound':'✕ Muted',\n      speed:s.speed,speedLabel:s.speed.toFixed(1)+'×',onSpeed:this.onSpeed,\n      toggleTheme:this.toggleTheme,toggleSound:this.toggleSound,toggleInterview:this.toggleInterview,\n      queue:s.queue,\n      // memory\n      cells,wpStyle:{transform:'translateY('+(f.wp*PITCH)+'px)'},rpStyle:{transform:'translateY('+(f.rp*PITCH)+'px)'},\n      wp:f.wp,rp:f.rp,wpBin:binN(f.wp,f.bits),rpBin:binN(f.rp,f.bits),\n      // io\n      inVal:s.inActive?'0x'+s.inVal:(s.inVal==='--'?'--':'0x'+s.inVal),outVal:s.outVal==='--'?'--':'0x'+s.outVal,\n      inCap:'capsule in'+(s.inActive?'':' dim'),outCap:'capsule out'+(s.outActive?'':' dim'),\n      explain:s.explain,\n      fillStyle:{transform:'scaleX('+(f.count/size)+')'},\n      // status\n      count:f.count,size,free:size-f.count,cycle:f.cycle,writes:f.writes,reads:f.reads,\n      flagFull:fl(full,'full'),flagEmpty:fl(empty,'empty'),flagAF:fl(af,'afull'),flagAE:fl(ae,'aempty'),\n      clkState:this.running?'▶ running':'❚❚ stopped',clkColor:this.running?'var(--green)':'var(--faint)',\n      // controls\n      doWrite:this.doWrite,doRead:this.doRead,pulse:this.pulse,toggleClock:this.toggleClock,resetFifo:this.resetFifo,\n      clearFifo:this.clearFifo,toggleDemo:this.toggleDemo,exportLog:this.exportLog,toggleWE:this.toggleWE,toggleRE:this.toggleRE,\n      clkBtnCls:'cbtn'+(this.running?' active':''),clkBtnIcon:this.running?'❚❚':'▶',clkBtnLabel:this.running?'Stop Clock':'Start Clock',\n      demoBtnCls:'cbtn'+(s.demo?' active':' amber'),\n      weCls:'sw we'+(this.we?' on':''),reCls:'sw re'+(this.re?' on':''),\n      // log\n      log:s.log,logCount:s.log.length,hasLog:s.log.length>0,noLog:s.log.length===0,\n      // quiz\n      quiz,quizScore:score,quizTotal:this.quizDef.length,\n      // interview\n      showInterview:s.showInterview,closeInterviewBg:this.closeInterviewBg,stop:this.stop\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
